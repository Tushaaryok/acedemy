name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # VITE_API_URL must be set in:
      # GitHub → Repo Settings → Secrets → Actions
      # Value in production: https://your-railway-app.up.railway.app
      # Value for preview/CI: leave empty (Vite proxy handles local dev)
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Actual deployment to Vercel is triggered automatically
      # via the Vercel GitHub integration — no extra step needed here.
      # This job only validates that the build succeeds before merge.
